<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Gate Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            background: #1a1a1a;
            width: 100vw;
            height: 100vh;
        }

        #canvas {
            display: block;
            cursor: grab;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #canvas.grabbing {
            cursor: grabbing;
        }

        .nav-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        .nav-item {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            outline: none;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .nav-item:active {
            transform: translateY(0);
        }

        .nav-item.active {
            background: #007AFF;
        }

        .nav-item.active:hover {
            background: #0066CC;
        }

        .nav-item.active .shortcut {
            background: rgba(255, 255, 255, 0.25);
        }

        .nav-divider {
            width: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1px;
            margin: 0 4px;
            flex-shrink: 0;
        }

        .nav-item .shortcut {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #007AFF;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
        }

        .component-popup {
            position: fixed;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 2000;
            display: none;
        }

        .component-popup.show {
            display: block;
        }

        .popup-item {
            padding: 12px 20px;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
            font-size: 14px;
        }

        .popup-item:hover,
        .popup-item.selected {
            background: rgba(255, 255, 255, 0.1);
        }

        .zoom-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 8px;
            color: white;
            font-size: 12px;
            font-weight: 500;
            z-index: 1000;
        }

        .label-editor {
            position: fixed;
            display: none;
            z-index: 3000;
            background: #2C2C2E;
            color: white;
            border: 2px solid #007AFF;
            border-radius: 6px;
            padding: 2px 6px;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            min-width: 100px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="nav-bar">
        <button class="nav-item active" id="modePan">
            Pan Mode
            <span class="shortcut">V</span>
        </button>
        <button class="nav-item" id="modeSelect">
            Select Mode
            <span class="shortcut">S</span>
        </button>
        <div class="nav-divider"></div>
        <button class="nav-item" data-type="input">
            Input
            <span class="shortcut">1</span>
        </button>
        <button class="nav-item" data-type="output">
            Output
            <span class="shortcut">2</span>
        </button>
        <button class="nav-item" data-type="gate">
            Gate
            <span class="shortcut">3</span>
        </button>
        <button class="nav-item" data-type="not_gate">
            NOT Gate
            <span class="shortcut">4</span>
        </button>
        <button class="nav-item" data-type="label_box">
            Label Box
            <span class="shortcut">5</span>
        </button>
    </div>

    <div class="component-popup" id="componentPopup">
        <div class="popup-item" data-type="input">Input</div>
        <div class="popup-item" data-type="output">Output</div>
        <div class="popup-item" data-type="gate">AND Gate</div>
        <div class="popup-item" data-type="not_gate">NOT Gate</div>
        <div class="popup-item" data-type="label_box">Label Box</div>
    </div>

    <div class="zoom-indicator" id="zoomIndicator">100%</div>
    <input type="text" id="labelEditor" class="label-editor" autocomplete="off" spellcheck="false" />

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const popup = document.getElementById('componentPopup');
        const zoomIndicator = document.getElementById('zoomIndicator');
        const labelEditor = document.getElementById('labelEditor');

        // Canvas state
        let camera = { x: 0, y: 0, zoom: 1 };
        let components =[];
        let wires =[];
        let nextId = 1;
        let dpr = window.devicePixelRatio || 1;

        // Interaction state
        let isSelectMode = false;
        let isDraggingCanvas = false;
        let isDraggingComponent = null;
        let isResizingComponent = null;
        let resizeStart = { w: 0, h: 0 };
        let isDraggingPin = null;
        let dragStart = { x: 0, y: 0 };
        let mousePos = { x: 0, y: 0 };
        let popupVisible = false;
        let popupSelectedIndex = 0;
        let popupSourcePin = null;
        let hoveredPin = null;
        let selectedPin = null;
        let selectedWire = null;
        let selectedComponents =[];
        let editingComponent = null;
        
        // Track valid pin drags instead of immediate single clicks
        let dragStartMousePos = { x: 0, y: 0 };
        let pinDragDidMove = false;

        // Group Selection and Multi-drag states
        let dragStartWorld = { x: 0, y: 0 };
        let selectedComponentsInitPos =[];
        let componentDragDidMove = false;
        let isSelectingBox = false;
        let selectionBoxStart = { x: 0, y: 0 };
        let selectionBoxEnd = { x: 0, y: 0 };

        // Constants
        const GRID_SIZE = 30;
        const PIN_RADIUS = 6;
        const COMPONENT_WIDTH = 80;
        const COMPONENT_HEIGHT = 50;

        // Helper function for rounded rectangles
        if (!ctx.roundRect) {
            ctx.roundRect = function(x, y, width, height, radius) {
                if (typeof radius === 'number') {
                    radius = {tl: radius, tr: radius, br: radius, bl: radius};
                }
                this.beginPath();
                this.moveTo(x + radius.tl, y);
                this.lineTo(x + width - radius.tr, y);
                this.quadraticCurveTo(x + width, y, x + width, y + radius.tr);
                this.lineTo(x + width, y + height - radius.br);
                this.quadraticCurveTo(x + width, y + height, x + width - radius.br, y + height);
                this.lineTo(x + radius.bl, y + height);
                this.quadraticCurveTo(x, y + height, x, y + height - radius.bl);
                this.lineTo(x, y + radius.tl);
                this.quadraticCurveTo(x, y, x + radius.tl, y);
                this.closePath();
            };
        }

        // Component class
        class Component {
            constructor(type, x, y) {
                this.id = nextId++;
                this.type = type;
                this.x = x;
                this.y = y;
                this.width = COMPONENT_WIDTH;
                this.height = COMPONENT_HEIGHT;
                
                if (type === 'label_box') {
                    this.width = 250;
                    this.height = 180;
                    this.label = 'Circuit Label';
                    this.inputs = [];
                    this.outputs =[];
                } else if (type === 'input') {
                    this.state = false;
                    this.outputs = [{ x: this.width, y: this.height / 2, connections: [] }];
                    this.inputs =[];
                } else if (type === 'output') {
                    this.inputs = [{ x: 0, y: this.height / 2, connections: [] }];
                    this.outputs =[];
                    this.state = false;
                } else if (type === 'gate') {
                    this.state = false;
                    this.inputs = [
                        { x: 0, y: this.height * 0.3, connections: [] },
                        { x: 0, y: this.height * 0.7, connections:[] }
                    ];
                    this.outputs = [{ x: this.width, y: this.height / 2, connections: [] }];
                } else if (type === 'not_gate') {
                    this.state = true;
                    this.inputs = [
                        { x: 0, y: this.height / 2, connections: [] }
                    ];
                    this.outputs = [{ x: this.width, y: this.height / 2, connections: [] }];
                }
            }

            draw() {
                if (this.type === 'label_box') {
                    ctx.save();
                    
                    if (selectedComponents.includes(this)) {
                        ctx.fillStyle = 'rgba(0, 122, 255, 0.05)';
                        ctx.strokeStyle = '#007AFF';
                        ctx.lineWidth = 2;
                        ctx.setLineDash([]);
                    } else {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.015)';
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                        ctx.lineWidth = 2;
                        ctx.setLineDash([6, 6]);
                    }
                    
                    ctx.beginPath();
                    ctx.roundRect(this.x, this.y, this.width, this.height, 12);
                    ctx.fill();
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    // Draw Label Header
                    ctx.fillStyle = selectedComponents.includes(this) ? '#007AFF' : 'rgba(255, 255, 255, 0.6)';
                    ctx.font = '600 14px sans-serif';
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'top';
                    ctx.fillText(this.label, this.x + 14, this.y + 14);
                    
                    // Draw Resize Handle
                    ctx.fillStyle = selectedComponents.includes(this) ? '#007AFF' : 'rgba(255, 255, 255, 0.2)';
                    ctx.beginPath();
                    ctx.moveTo(this.x + this.width - 16, this.y + this.height);
                    ctx.lineTo(this.x + this.width, this.y + this.height - 16);
                    ctx.lineTo(this.x + this.width, this.y + this.height);
                    ctx.fill();
                    
                    ctx.restore();
                    return; // Skip drawing logic gate details
                }

                ctx.save();
                
                if (selectedComponents.includes(this)) {
                    ctx.save();
                    ctx.fillStyle = 'rgba(255, 214, 10, 0.1)';
                    ctx.strokeStyle = '#FFD60A';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.roundRect(this.x - 4, this.y - 4, this.width + 8, this.height + 8, 8);
                    ctx.fill();
                    ctx.stroke();
                    ctx.restore();
                }

                if (this.type === 'input') {
                    const toggleWidth = 60;
                    const toggleHeight = 32;
                    const toggleX = this.x + (this.width - toggleWidth) / 2;
                    const toggleY = this.y + (this.height - toggleHeight) / 2;
                    
                    ctx.fillStyle = this.state ? '#34C759' : '#3A3A3C';
                    ctx.beginPath();
                    ctx.roundRect(toggleX, toggleY, toggleWidth, toggleHeight, 8);
                    ctx.fill();
                    
                    const knobSize = 24;
                    const knobX = this.state ? toggleX + toggleWidth - knobSize - 4 : toggleX + 4;
                    const knobY = toggleY + 4;
                    
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.roundRect(knobX, knobY, knobSize, knobSize, 6);
                    ctx.fill();
                    
                } else if (this.type === 'output') {
                    const centerX = this.x + this.width / 2;
                    const centerY = this.y + this.height / 2;
                    const size = 18;
                    
                    ctx.fillStyle = this.state ? '#34C759' : '#2C2C2E';
                    ctx.strokeStyle = this.state ? '#34C759' : '#48484A';
                    ctx.lineWidth = 3;
                    
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = (Math.PI / 3) * i;
                        const x = centerX + size * Math.cos(angle);
                        const y = centerY + size * Math.sin(angle);
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    
                    if (this.state) {
                        ctx.fillStyle = 'rgba(52, 199, 89, 0.4)';
                        ctx.beginPath();
                        for (let i = 0; i < 6; i++) {
                            const angle = (Math.PI / 3) * i;
                            const x = centerX + (size - 4) * Math.cos(angle);
                            const y = centerY + (size - 4) * Math.sin(angle);
                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                        ctx.closePath();
                        ctx.fill();
                    }
                    
                } else if (this.type === 'gate' || this.type === 'not_gate') {
                    const chipWidth = 65;
                    const chipHeight = 40;
                    const chipX = this.x + (this.width - chipWidth) / 2;
                    const chipY = this.y + (this.height - chipHeight) / 2;
                    
                    ctx.fillStyle = this.state ? '#5856D6' : '#2C2C2E';
                    ctx.strokeStyle = this.state ? '#7D7AFF' : '#48484A';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.roundRect(chipX, chipY, chipWidth, chipHeight, 6);
                    ctx.fill();
                    ctx.stroke();
                    
                    ctx.fillStyle = this.state ? 'white' : '#8E8E93';
                    ctx.font = 'bold 14px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const text = this.type === 'gate' ? 'AND' : 'NOT';
                    ctx.fillText(text, this.x + this.width / 2, this.y + this.height / 2);
                }
                
                this.inputs.forEach(pin => {
                    const px = this.x + pin.x;
                    const py = this.y + pin.y;
                    
                    const isHovered = hoveredPin && hoveredPin.pin === pin && hoveredPin.component === this;
                    const isSelected = selectedPin && selectedPin.pin === pin && selectedPin.component === this;
                    
                    if (isHovered) {
                        const gradient = ctx.createRadialGradient(px, py, PIN_RADIUS, px, py, PIN_RADIUS * 4);
                        gradient.addColorStop(0, 'rgba(0, 122, 255, 0.4)');
                        gradient.addColorStop(1, 'rgba(0, 122, 255, 0)');
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(px, py, PIN_RADIUS * 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    
                    if (isSelected) {
                        ctx.strokeStyle = '#FFD60A';
                        ctx.lineWidth = 3;
                        ctx.shadowColor = '#FFD60A';
                        ctx.shadowBlur = 15;
                        ctx.beginPath();
                        ctx.arc(px, py, PIN_RADIUS * 2.5, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.shadowBlur = 0;
                    }
                    
                    ctx.fillStyle = '#007AFF';
                    ctx.beginPath();
                    ctx.arc(px, py, PIN_RADIUS, 0, Math.PI * 2);
                    ctx.fill();
                    
                    if (isSelected) {
                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(px, py, PIN_RADIUS * 0.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
                
                this.outputs.forEach(pin => {
                    const px = this.x + pin.x;
                    const py = this.y + pin.y;
                    
                    const isSelected = selectedPin && selectedPin.pin === pin && selectedPin.component === this;
                    const isHovered = hoveredPin && hoveredPin.pin === pin && hoveredPin.component === this;
                    
                    if (isHovered) {
                        const gradient = ctx.createRadialGradient(px, py, PIN_RADIUS, px, py, PIN_RADIUS * 4);
                        gradient.addColorStop(0, 'rgba(255, 149, 0, 0.4)');
                        gradient.addColorStop(1, 'rgba(255, 149, 0, 0)');
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(px, py, PIN_RADIUS * 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    
                    if (isSelected) {
                        ctx.strokeStyle = '#FFD60A';
                        ctx.lineWidth = 3;
                        ctx.shadowColor = '#FFD60A';
                        ctx.shadowBlur = 15;
                        ctx.beginPath();
                        ctx.arc(px, py, PIN_RADIUS * 2.5, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.shadowBlur = 0;
                    }
                    
                    ctx.fillStyle = '#FF9500';
                    ctx.beginPath();
                    ctx.arc(px, py, PIN_RADIUS, 0, Math.PI * 2);
                    ctx.fill();
                    
                    if (isSelected) {
                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(px, py, PIN_RADIUS * 0.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
                
                ctx.restore();
            }

            containsPoint(x, y) {
                if (this.type === 'label_box') {
                    // Only allow selecting/dragging by the header (top 40px) or the thin 10px edges
                    // This lets clicks inside the large empty body fall through for canvas panning/selection!
                    const inHeader = x >= this.x && x <= this.x + this.width &&
                                     y >= this.y && y <= this.y + 40;
                    
                    const inBorder = x >= this.x && x <= this.x + this.width &&
                                     y >= this.y && y <= this.y + this.height &&
                                     (x <= this.x + 10 || x >= this.x + this.width - 10 || y >= this.y + this.height - 10);
                                     
                    return inHeader || inBorder;
                }

                return x >= this.x && x <= this.x + this.width &&
                       y >= this.y && y <= this.y + this.height;
            }

            getPinAt(x, y) {
                if (this.type === 'label_box') return null;

                for (let pin of this.inputs) {
                    const px = this.x + pin.x;
                    const py = this.y + pin.y;
                    if (Math.hypot(x - px, y - py) < PIN_RADIUS * 2) {
                        return { pin, type: 'input', component: this };
                    }
                }
                for (let pin of this.outputs) {
                    const px = this.x + pin.x;
                    const py = this.y + pin.y;
                    if (Math.hypot(x - px, y - py) < PIN_RADIUS * 2) {
                        return { pin, type: 'output', component: this };
                    }
                }
                return null;
            }

            getResizeHandleAt(x, y) {
                if (this.type !== 'label_box') return false;
                // Bottom right corner, 20x20 triangle area
                return x >= this.x + this.width - 20 && x <= this.x + this.width &&
                       y >= this.y + this.height - 20 && y <= this.y + this.height;
            }

            getInputSignal(inputPin) {
                const connectedWires = wires.filter(wire => 
                    wire.to.component === this && wire.to.pin === inputPin
                );
                return connectedWires.some(wire => wire.from.component.state);
            }

            updateState() {
                if (this.type === 'output') {
                    if (this.inputs.length > 0) {
                        this.state = this.getInputSignal(this.inputs[0]);
                    }
                } else if (this.type === 'gate') {
                    const input1 = this.inputs.length > 0 ? this.getInputSignal(this.inputs[0]) : false;
                    const input2 = this.inputs.length > 1 ? this.getInputSignal(this.inputs[1]) : false;
                    this.state = input1 && input2;
                } else if (this.type === 'not_gate') {
                    const input1 = this.inputs.length > 0 ? this.getInputSignal(this.inputs[0]) : false;
                    this.state = !input1;
                }
            }
        }

        // Initialize canvas
        function resizeCanvas() {
            dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
            draw();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function screenToWorld(screenX, screenY) {
            return {
                x: (screenX - camera.x) / camera.zoom,
                y: (screenY - camera.y) / camera.zoom
            };
        }

        function worldToScreen(worldX, worldY) {
            return {
                x: worldX * camera.zoom + camera.x,
                y: worldY * camera.zoom + camera.y
            };
        }

        function drawGrid() {
            const canvasWidth = canvas.width / dpr;
            const canvasHeight = canvas.height / dpr;
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;

            const startX = Math.floor(-camera.x / camera.zoom / GRID_SIZE) * GRID_SIZE;
            const startY = Math.floor(-camera.y / camera.zoom / GRID_SIZE) * GRID_SIZE;
            const endX = startX + canvasWidth / camera.zoom + GRID_SIZE;
            const endY = startY + canvasHeight / camera.zoom + GRID_SIZE;

            for (let x = startX; x < endX; x += GRID_SIZE) {
                const screenX = x * camera.zoom + camera.x;
                ctx.beginPath();
                ctx.moveTo(screenX, 0);
                ctx.lineTo(screenX, canvasHeight);
                ctx.stroke();
            }

            for (let y = startY; y < endY; y += GRID_SIZE) {
                const screenY = y * camera.zoom + camera.y;
                ctx.beginPath();
                ctx.moveTo(0, screenY);
                ctx.lineTo(canvasWidth, screenY);
                ctx.stroke();
            }
        }

        function getOrthogonalPath(fromX, fromY, toX, toY, isSelfLoop = false) {
            const points =[];
            const offset = 20; 
            
            points.push({ x: fromX, y: fromY });
            
            if (isSelfLoop) {
                const loopDir = toY > fromY ? 1 : -1;
                const loopY = (toY > fromY ? Math.max(fromY, toY) : Math.min(fromY, toY)) + (loopDir * 45);
                
                points.push({ x: fromX + offset, y: fromY });
                points.push({ x: fromX + offset, y: loopY });
                points.push({ x: toX - offset, y: loopY });
                points.push({ x: toX - offset, y: toY });
            } else {
                if (fromX + offset < toX - offset) {
                    const midX = fromX + (toX - fromX) / 2;
                    points.push({ x: midX, y: fromY });
                    points.push({ x: midX, y: toY });
                } else {
                    const distY = Math.abs(fromY - toY);
                    let routeY;
                    if (distY < 60) {
                        routeY = Math.max(fromY, toY) + 60;
                    } else {
                        routeY = fromY + (toY - fromY) / 2;
                    }
                    
                    points.push({ x: fromX + offset, y: fromY });
                    points.push({ x: fromX + offset, y: routeY });
                    points.push({ x: toX - offset, y: routeY });
                    points.push({ x: toX - offset, y: toY });
                }
            }
            
            points.push({ x: toX, y: toY });
            return points;
        }

        function drawPathWithRoundedCorners(ctx, points, baseRadius) {
            if (points.length === 0) return;
            
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            
            for (let i = 1; i < points.length - 1; i++) {
                const p0 = points[i - 1];
                const p1 = points[i];
                const p2 = points[i + 1];
                
                const d1 = Math.hypot(p1.x - p0.x, p1.y - p0.y);
                const d2 = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                const radius = Math.min(baseRadius, d1 / 2, d2 / 2);
                
                ctx.arcTo(p1.x, p1.y, p2.x, p2.y, radius);
            }
            
            const last = points[points.length - 1];
            ctx.lineTo(last.x, last.y);
            ctx.stroke();
        }

        function distancePointToSegment(px, py, x1, y1, x2, y2) {
            const A = px - x1;
            const B = py - y1;
            const C = x2 - x1;
            const D = y2 - y1;

            const dot = A * C + B * D;
            const len_sq = C * C + D * D;
            let param = -1;
            
            if (len_sq !== 0) param = dot / len_sq;

            let xx, yy;
            if (param < 0) {
                xx = x1;
                yy = y1;
            } else if (param > 1) {
                xx = x2;
                yy = y2;
            } else {
                xx = x1 + param * C;
                yy = y1 + param * D;
            }

            const dx = px - xx;
            const dy = py - yy;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function isPointNearWire(worldX, worldY, wire) {
            const fromX = wire.from.component.x + wire.from.pin.x;
            const fromY = wire.from.component.y + wire.from.pin.y;
            const toX = wire.to.component.x + wire.to.pin.x;
            const toY = wire.to.component.y + wire.to.pin.y;
            
            const isSelfLoop = wire.from.component === wire.to.component;
            const points = getOrthogonalPath(fromX, fromY, toX, toY, isSelfLoop);
            
            const threshold = 10 / camera.zoom;
            
            for (let i = 0; i < points.length - 1; i++) {
                const p1 = points[i];
                const p2 = points[i + 1];
                const dist = distancePointToSegment(worldX, worldY, p1.x, p1.y, p2.x, p2.y);
                if (dist < threshold) {
                    return true;
                }
            }
            return false;
        }

        function drawWires() {
            const scaledRadius = 8 * camera.zoom;

            wires.forEach((wire) => {
                const fromWorldX = wire.from.component.x + wire.from.pin.x;
                const fromWorldY = wire.from.component.y + wire.from.pin.y;
                const toWorldX = wire.to.component.x + wire.to.pin.x;
                const toWorldY = wire.to.component.y + wire.to.pin.y;

                const isWireSelected = selectedWire === wire;
                const isWireActive = wire.from.component.state;
                const isSelfLoop = wire.from.component === wire.to.component;
                
                const points = getOrthogonalPath(fromWorldX, fromWorldY, toWorldX, toWorldY, isSelfLoop);
                const screenPoints = points.map(p => worldToScreen(p.x, p.y));

                if (isWireSelected) {
                    ctx.strokeStyle = '#34C759';
                    ctx.lineWidth = 7;
                    ctx.shadowColor = '#34C759';
                    ctx.shadowBlur = 20;
                    drawPathWithRoundedCorners(ctx, screenPoints, scaledRadius);
                    ctx.shadowBlur = 0;
                }
                
                ctx.strokeStyle = isWireSelected ? '#34C759' : (isWireActive ? '#34C759' : '#666');
                ctx.lineWidth = 3;
                drawPathWithRoundedCorners(ctx, screenPoints, scaledRadius);
                
                if (isWireSelected) {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.lineWidth = 1;
                    drawPathWithRoundedCorners(ctx, screenPoints, scaledRadius);
                }
            });

            if (isDraggingPin && pinDragDidMove) {
                const fromWorldX = isDraggingPin.component.x + isDraggingPin.pin.x;
                const fromWorldY = isDraggingPin.component.y + isDraggingPin.pin.y;
                const mouseWorld = screenToWorld(mousePos.x, mousePos.y);

                let actualFromWorld, actualToWorld;
                let isSelfLoopTemp = false;

                if (hoveredPin && hoveredPin.component === isDraggingPin.component) {
                    isSelfLoopTemp = true;
                }

                if (isDraggingPin.type === 'input') {
                    actualFromWorld = mouseWorld;
                    actualToWorld = { x: fromWorldX, y: fromWorldY };
                } else {
                    actualFromWorld = { x: fromWorldX, y: fromWorldY };
                    actualToWorld = mouseWorld;
                }

                const points = getOrthogonalPath(actualFromWorld.x, actualFromWorld.y, actualToWorld.x, actualToWorld.y, isSelfLoopTemp);
                const screenPoints = points.map(p => worldToScreen(p.x, p.y));

                ctx.strokeStyle = '#007AFF';
                ctx.lineWidth = 3;
                ctx.setLineDash([5, 5]);
                drawPathWithRoundedCorners(ctx, screenPoints, scaledRadius);
                ctx.setLineDash([]);
            }
        }

        function removeWiresForPin(pinInfo) {
            wires = wires.filter(wire => {
                return !(wire.from.component === pinInfo.component && wire.from.pin === pinInfo.pin) &&
                       !(wire.to.component === pinInfo.component && wire.to.pin === pinInfo.pin);
            });
            pinInfo.pin.connections =[];
        }

        function draw() {
            const canvasWidth = canvas.width / dpr;
            const canvasHeight = canvas.height / dpr;
            
            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
            
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            
            drawGrid();
            
            ctx.save();
            ctx.translate(camera.x, camera.y);
            ctx.scale(camera.zoom, camera.zoom);
            
            // Draw background labels/boxes first so they are under logic gates
            components.filter(c => c.type === 'label_box').forEach(comp => comp.draw());
            
            // Draw logic components on top
            components.filter(c => c.type !== 'label_box').forEach(comp => comp.draw());
            
            if (isSelectingBox) {
                ctx.fillStyle = 'rgba(0, 122, 255, 0.15)';
                ctx.strokeStyle = '#007AFF';
                ctx.lineWidth = 1 / camera.zoom;
                
                const x = selectionBoxStart.x;
                const y = selectionBoxStart.y;
                const w = selectionBoxEnd.x - x;
                const h = selectionBoxEnd.y - y;
                
                ctx.beginPath();
                ctx.rect(x, y, w, h);
                ctx.fill();
                ctx.stroke();
            }
            
            ctx.restore();
            
            drawWires();
            
            ctx.restore();
        }

        function createComponent(type, worldX, worldY) {
            const comp = new Component(type, worldX, worldY);
            components.push(comp);
            return comp;
        }

        function autoSpawnComponent(type) {
            const rect = canvas.getBoundingClientRect();
            const world = screenToWorld(rect.width / 2, rect.height / 2);
            
            const w = type === 'label_box' ? 250 : COMPONENT_WIDTH;
            const h = type === 'label_box' ? 180 : COMPONENT_HEIGHT;
            
            let baseX = world.x - w / 2;
            let baseY = world.y - h / 2;
            let offset = 0;
            
            while (components.some(c => Math.abs(c.x - (baseX + offset)) < 5 && Math.abs(c.y - (baseY + offset)) < 5)) {
                offset += 20;
            }
            
            createComponent(type, baseX + offset, baseY + offset);
            draw();
        }

        function updateLogic() {
            let changed = true;
            let attempts = 0;
            const maxAttempts = 1000;

            while (changed && attempts < maxAttempts) {
                changed = false;
                
                const prevStates = new Map();
                components.forEach(c => prevStates.set(c.id, c.state));
                
                components.filter(c => c.type === 'gate' || c.type === 'not_gate').forEach(comp => comp.updateState());
                components.filter(c => c.type === 'output').forEach(comp => comp.updateState());
                
                components.forEach(c => {
                    if (c.state !== prevStates.get(c.id)) {
                        changed = true;
                    }
                });
                
                attempts++;
            }
            
            draw();
        }

        function openLabelEditor(comp) {
            editingComponent = comp;
            labelEditor.value = comp.label;
            labelEditor.style.display = 'block';
            
            const screenPos = worldToScreen(comp.x + 12, comp.y + 12);
            
            labelEditor.style.left = screenPos.x + 'px';
            labelEditor.style.top = (screenPos.y - 4) + 'px';
            labelEditor.style.transform = `scale(${camera.zoom})`;
            labelEditor.style.transformOrigin = 'left top';
            
            labelEditor.focus();
            labelEditor.select();
        }

        labelEditor.addEventListener('blur', () => {
            if (editingComponent) {
                editingComponent.label = labelEditor.value || 'Label';
                editingComponent = null;
                labelEditor.style.display = 'none';
                draw();
            }
        });

        labelEditor.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                labelEditor.blur();
            }
            e.stopPropagation();
        });

        document.addEventListener('keydown', (e) => {
            if (document.activeElement === labelEditor) {
                return; // Let user type freely
            }

            if (e.key.toLowerCase() === 'v') {
                isSelectMode = false;
                updateModeUI();
                draw();
                return;
            }

            if (e.key.toLowerCase() === 's') {
                isSelectMode = true;
                updateModeUI();
                draw();
                return;
            }

            if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'a') {
                e.preventDefault();
                selectedComponents = [...components];
                selectedPin = null;
                selectedWire = null;
                if (popupVisible) {
                    popup.classList.remove('show');
                    popupVisible = false;
                    popupSourcePin = null;
                }
                draw();
                return;
            }

            if ((e.key === 'Delete' || e.key === 'Backspace') && (selectedPin || selectedWire || selectedComponents.length > 0)) {
                e.preventDefault();
                
                if (selectedPin) {
                    removeWiresForPin(selectedPin);
                    selectedPin = null;
                } else if (selectedWire) {
                    wires = wires.filter(wire => wire !== selectedWire);
                    selectedWire = null;
                } else if (selectedComponents.length > 0) {
                    selectedComponents.forEach(comp => {
                        wires = wires.filter(wire => wire.from.component !== comp && wire.to.component !== comp);
                    });
                    components = components.filter(c => !selectedComponents.includes(c));
                    selectedComponents =[];
                }
                updateLogic();
                draw();
                return;
            }

            if (popupVisible) {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    const itemsCount = popup.querySelectorAll('.popup-item').length;
                    popupSelectedIndex = (popupSelectedIndex + 1) % itemsCount;
                    updatePopupSelection();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    const itemsCount = popup.querySelectorAll('.popup-item').length;
                    popupSelectedIndex = (popupSelectedIndex - 1 + itemsCount) % itemsCount;
                    updatePopupSelection();
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    selectPopupItem();
                } else if (e.key === 'Escape') {
                    popup.classList.remove('show');
                    popupVisible = false;
                    popupSourcePin = null;
                }
                return;
            }

            if (e.key === '1') {
                autoSpawnComponent('input');
            } else if (e.key === '2') {
                autoSpawnComponent('output');
            } else if (e.key === '3') {
                autoSpawnComponent('gate');
            } else if (e.key === '4') {
                autoSpawnComponent('not_gate');
            } else if (e.key === '5') {
                autoSpawnComponent('label_box');
            } else if (e.key === 'Escape') {
                selectedPin = null;
                selectedWire = null;
                selectedComponents =[];
                isDraggingPin = null;
                hoveredPin = null;
                draw();
            }
        });

        function handleComponentClick(comp, world, screenX, screenY, e) {
            const isMultiSelectModifier = e.shiftKey || e.metaKey || e.ctrlKey;
            
            if (isMultiSelectModifier) {
                if (selectedComponents.includes(comp)) {
                    selectedComponents = selectedComponents.filter(c => c !== comp);
                    isDraggingComponent = null;
                } else {
                    selectedComponents.push(comp);
                    isDraggingComponent = comp;
                }
                
                if (comp.type === 'input' && selectedComponents.includes(comp)) {
                    comp.state = !comp.state;
                    updateLogic();
                }
            } else {
                if (!selectedComponents.includes(comp)) {
                    selectedComponents = [comp];
                }
                isDraggingComponent = comp;
                
                if (comp.type === 'input') {
                    comp.state = !comp.state;
                    updateLogic();
                }
            }

            selectedPin = null;
            selectedWire = null;
            
            if (isDraggingComponent) {
                dragStartWorld = { x: world.x, y: world.y };
                dragStartMousePos = { x: screenX, y: screenY };
                selectedComponentsInitPos = selectedComponents.map(c => ({ id: c.id, x: c.x, y: c.y }));
                componentDragDidMove = false;
            }
            
            draw();
        }

        canvas.addEventListener('mousedown', (e) => {
            if (document.activeElement === labelEditor && e.target !== labelEditor) {
                labelEditor.blur();
            }

            if (popupVisible) {
                return;
            }

            const rect = canvas.getBoundingClientRect();
            const screenX = e.clientX - rect.left;
            const screenY = e.clientY - rect.top;
            const world = screenToWorld(screenX, screenY);
            
            mousePos = { x: screenX, y: screenY };

            // 1. Check Pins
            for (let comp of [...components].reverse()) {
                const pinInfo = comp.getPinAt(world.x, world.y);
                if (pinInfo) {
                    isDraggingPin = pinInfo;
                    dragStartMousePos = { x: screenX, y: screenY };
                    pinDragDidMove = false;
                    
                    selectedPin = pinInfo;
                    selectedWire = null;
                    selectedComponents =[];
                    draw();
                    return;
                }
            }

            // 2. Check Wires
            for (let wire of wires) {
                if (isPointNearWire(world.x, world.y, wire)) {
                    selectedWire = wire;
                    selectedPin = null;
                    selectedComponents =[];
                    isDraggingPin = null;
                    draw();
                    return;
                }
            }

            // 3. Check Box Resizing Handles
            for (let comp of [...components].reverse()) {
                if (comp.type === 'label_box' && comp.getResizeHandleAt(world.x, world.y)) {
                    isResizingComponent = comp;
                    dragStartWorld = { x: world.x, y: world.y };
                    resizeStart = { w: comp.width, h: comp.height };
                    selectedPin = null;
                    selectedWire = null;
                    if (!selectedComponents.includes(comp)) {
                        selectedComponents = [comp];
                    }
                    draw();
                    return;
                }
            }

            // 4. Check Logic Components
            const logicComps = components.filter(c => c.type !== 'label_box');
            for (let comp of [...logicComps].reverse()) {
                if (comp.containsPoint(world.x, world.y)) {
                    handleComponentClick(comp, world, screenX, screenY, e);
                    return;
                }
            }

            // 5. Check Label Boxes background
            const boxComps = components.filter(c => c.type === 'label_box');
            for (let comp of [...boxComps].reverse()) {
                if (comp.containsPoint(world.x, world.y)) {
                    handleComponentClick(comp, world, screenX, screenY, e);
                    return;
                }
            }

            // 6. Canvas Operations (Box select or Pan)
            if (isSelectMode || e.shiftKey || e.metaKey || e.ctrlKey) {
                isSelectingBox = true;
                selectionBoxStart = { x: world.x, y: world.y };
                selectionBoxEnd = { x: world.x, y: world.y };
                selectedPin = null;
                selectedWire = null;
                if (!e.shiftKey && !e.metaKey && !e.ctrlKey) {
                    selectedComponents =[];
                }
                draw();
                return;
            }

            isDraggingCanvas = true;
            dragStart = { x: e.clientX - camera.x, y: e.clientY - camera.y };
            
            selectedPin = null;
            selectedWire = null;
            selectedComponents =[];
            draw();
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const screenX = e.clientX - rect.left;
            const screenY = e.clientY - rect.top;
            const world = screenToWorld(screenX, screenY);
            
            mousePos = { x: screenX, y: screenY };

            // Hover pin checks
            hoveredPin = null;
            for (let comp of components) {
                const pinInfo = comp.getPinAt(world.x, world.y);
                if (pinInfo) {
                    if (isDraggingPin) {
                        if (pinInfo.type !== isDraggingPin.type) {
                            hoveredPin = pinInfo;
                        }
                    } else {
                        hoveredPin = pinInfo;
                    }
                    break;
                }
            }

            // Cursor updates
            let isHoveringResize = false;
            for (let comp of components) {
                if (comp.type === 'label_box' && comp.getResizeHandleAt(world.x, world.y)) {
                    isHoveringResize = true;
                    break;
                }
            }

            if (isResizingComponent || isHoveringResize) {
                canvas.style.cursor = 'nwse-resize';
            } else if (isDraggingCanvas) {
                canvas.style.cursor = 'grabbing';
            } else if (isSelectMode && !isDraggingPin && !isDraggingComponent) {
                canvas.style.cursor = 'crosshair';
            } else {
                canvas.style.cursor = 'grab';
            }

            // Drag operations
            if (isSelectingBox) {
                selectionBoxEnd = { x: world.x, y: world.y };
                draw();
            } else if (isResizingComponent) {
                const newWidth = Math.max(100, resizeStart.w + (world.x - dragStartWorld.x));
                const newHeight = Math.max(60, resizeStart.h + (world.y - dragStartWorld.y));
                isResizingComponent.width = newWidth;
                isResizingComponent.height = newHeight;
                draw();
            } else if (isDraggingCanvas) {
                camera.x = e.clientX - dragStart.x;
                camera.y = e.clientY - dragStart.y;
                draw();
            } else if (isDraggingComponent) {
                const deltaX = world.x - dragStartWorld.x;
                const deltaY = world.y - dragStartWorld.y;
                
                if (Math.abs(screenX - dragStartMousePos.x) > 3 || Math.abs(screenY - dragStartMousePos.y) > 3) {
                    componentDragDidMove = true;
                }
                
                selectedComponents.forEach(c => {
                    const initPos = selectedComponentsInitPos.find(pos => pos.id === c.id);
                    if (initPos) {
                        c.x = initPos.x + deltaX;
                        c.y = initPos.y + deltaY;
                    }
                });
                draw();
            } else if (isDraggingPin) {
                if (Math.hypot(screenX - dragStartMousePos.x, screenY - dragStartMousePos.y) > 5) {
                    pinDragDidMove = true;
                }
                draw();
            } else {
                draw();
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            const rect = canvas.getBoundingClientRect();
            const screenX = e.clientX - rect.left;
            const screenY = e.clientY - rect.top;
            const world = screenToWorld(screenX, screenY);

            if (isSelectingBox) {
                const dx = Math.abs(selectionBoxEnd.x - selectionBoxStart.x) * camera.zoom;
                const dy = Math.abs(selectionBoxEnd.y - selectionBoxStart.y) * camera.zoom;

                if (dx > 3 || dy > 3) {
                    const minX = Math.min(selectionBoxStart.x, selectionBoxEnd.x);
                    const maxX = Math.max(selectionBoxStart.x, selectionBoxEnd.x);
                    const minY = Math.min(selectionBoxStart.y, selectionBoxEnd.y);
                    const maxY = Math.max(selectionBoxStart.y, selectionBoxEnd.y);
                    
                    components.forEach(comp => {
                        const compRight = comp.x + comp.width;
                        const compBottom = comp.y + comp.height;
                        
                        if (comp.x <= maxX && compRight >= minX &&
                            comp.y <= maxY && compBottom >= minY) {
                            if (!selectedComponents.includes(comp)) {
                                selectedComponents.push(comp);
                            }
                        }
                    });
                }
                
                isSelectingBox = false;
                draw();
            }

            if (isDraggingPin) {
                if (pinDragDidMove) {
                    let targetPin = null;
                    for (let comp of components) {
                        const pinInfo = comp.getPinAt(world.x, world.y);
                        if (pinInfo && pinInfo.type !== isDraggingPin.type) {
                            targetPin = pinInfo;
                            break;
                        }
                    }

                    if (targetPin) {
                        const fromPin = isDraggingPin.type === 'output' ? isDraggingPin : targetPin;
                        const toPin = isDraggingPin.type === 'input' ? isDraggingPin : targetPin;
                        
                        const wireExists = wires.some(w => w.from.component === fromPin.component && 
                                                           w.from.pin === fromPin.pin && 
                                                           w.to.component === toPin.component && 
                                                           w.to.pin === toPin.pin);
                        if (!wireExists) {
                            wires.push({
                                from: fromPin,
                                to: toPin
                            });
                            toPin.pin.connections.push(fromPin.component);
                            updateLogic();
                        }
                    } else {
                        popup.style.left = screenX + 'px';
                        popup.style.top = screenY + 'px';
                        popup.classList.add('show');
                        popupVisible = true;
                        popupSelectedIndex = 0;
                        popupSourcePin = isDraggingPin;
                        updatePopupSelection();
                    }
                }
                
                isDraggingPin = null;
                hoveredPin = null;
            }

            if (isDraggingComponent) {
                if (!componentDragDidMove && !e.shiftKey && !e.metaKey && !e.ctrlKey) {
                    selectedComponents = [isDraggingComponent];
                }
                isDraggingComponent = null;
            }

            isResizingComponent = null;
            isDraggingCanvas = false;
            canvas.style.cursor = '';
            draw();
        });

        canvas.addEventListener('dblclick', (e) => {
            const rect = canvas.getBoundingClientRect();
            const screenX = e.clientX - rect.left;
            const screenY = e.clientY - rect.top;
            const world = screenToWorld(screenX, screenY);
            
            for (let comp of [...components].reverse()) {
                if (comp.type === 'label_box' && comp.containsPoint(world.x, world.y)) {
                    openLabelEditor(comp);
                    return;
                }
            }
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            
            if (document.activeElement === labelEditor) {
                labelEditor.blur();
            }
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            const worldBefore = screenToWorld(mouseX, mouseY);
            
            const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
            camera.zoom *= zoomFactor;
            camera.zoom = Math.max(0.1, Math.min(5, camera.zoom));
            
            const worldAfter = screenToWorld(mouseX, mouseY);
            
            camera.x += (worldAfter.x - worldBefore.x) * camera.zoom;
            camera.y += (worldAfter.y - worldBefore.y) * camera.zoom;
            
            zoomIndicator.textContent = Math.round(camera.zoom * 100) + '%';
            draw();
        }, { passive: false });

        function updatePopupSelection() {
            const items = popup.querySelectorAll('.popup-item');
            items.forEach((item, i) => {
                item.classList.toggle('selected', i === popupSelectedIndex);
            });
        }

        function selectPopupItem() {
            const items = popup.querySelectorAll('.popup-item');
            const selectedType = items[popupSelectedIndex].dataset.type;
            
            const rect = popup.getBoundingClientRect();
            const world = screenToWorld(rect.left, rect.top);
            
            const newComp = createComponent(selectedType, world.x, world.y);
            
            if (popupSourcePin) {
                if (popupSourcePin.type === 'output' && newComp.inputs.length > 0) {
                    const targetPin = { pin: newComp.inputs[0], type: 'input', component: newComp };
                    wires.push({
                        from: popupSourcePin,
                        to: targetPin
                    });
                    targetPin.pin.connections.push(popupSourcePin.component);
                } else if (popupSourcePin.type === 'input' && newComp.outputs.length > 0) {
                    const sourcePin = { pin: newComp.outputs[0], type: 'output', component: newComp };
                    wires.push({
                        from: sourcePin,
                        to: popupSourcePin
                    });
                    popupSourcePin.pin.connections.push(newComp);
                }
                updateLogic();
            }
            
            popup.classList.remove('show');
            popupVisible = false;
            popupSourcePin = null;
            draw();
        }

        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                const type = btn.dataset.type;
                if (type) {
                    autoSpawnComponent(type);
                }
                btn.blur();
            });
        });

        const modePanBtn = document.getElementById('modePan');
        const modeSelectBtn = document.getElementById('modeSelect');

        function updateModeUI() {
            if (modePanBtn && modeSelectBtn) {
                modePanBtn.classList.toggle('active', !isSelectMode);
                modeSelectBtn.classList.toggle('active', isSelectMode);
            }
        }

        if (modePanBtn) {
            modePanBtn.addEventListener('click', () => {
                isSelectMode = false;
                updateModeUI();
            });
        }

        if (modeSelectBtn) {
            modeSelectBtn.addEventListener('click', () => {
                isSelectMode = true;
                updateModeUI();
            });
        }

        document.querySelectorAll('.popup-item').forEach((item, index) => {
            item.addEventListener('mouseenter', () => {
                popupSelectedIndex = index;
                updatePopupSelection();
            });
            item.addEventListener('click', selectPopupItem);
        });

        document.addEventListener('mousedown', (e) => {
            if (popupVisible && !popup.contains(e.target)) {
                popup.classList.remove('show');
                popupVisible = false;
                popupSourcePin = null;
            }
        });
    </script>
</body>
