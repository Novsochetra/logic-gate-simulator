<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Gate Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            background: #1a1a1a;
            width: 100vw;
            height: 100vh;
        }

        #canvas {
            display: block;
            cursor: grab;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #canvas.grabbing {
            cursor: grabbing;
        }

        .nav-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        .nav-item {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .nav-item:active {
            transform: translateY(0);
        }

        .nav-item .shortcut {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #007AFF;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
        }

        .component-popup {
            position: fixed;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 2000;
            display: none;
        }

        .component-popup.show {
            display: block;
        }

        .popup-item {
            padding: 12px 20px;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
            font-size: 14px;
        }

        .popup-item:hover,
        .popup-item.selected {
            background: rgba(255, 255, 255, 0.1);
        }

        .zoom-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 8px;
            color: white;
            font-size: 12px;
            font-weight: 500;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="nav-bar">
        <button class="nav-item" data-type="input">
            Input
            <span class="shortcut">1</span>
        </button>
        <button class="nav-item" data-type="output">
            Output
            <span class="shortcut">2</span>
        </button>
        <button class="nav-item" data-type="gate">
            Gate
            <span class="shortcut">3</span>
        </button>
    </div>

    <div class="component-popup" id="componentPopup">
        <div class="popup-item" data-type="input">Input</div>
        <div class="popup-item" data-type="output">Output</div>
        <div class="popup-item" data-type="gate">Gate</div>
    </div>

    <div class="zoom-indicator" id="zoomIndicator">100%</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const popup = document.getElementById('componentPopup');
        const zoomIndicator = document.getElementById('zoomIndicator');

        // Canvas state
        let camera = { x: 0, y: 0, zoom: 1 };
        let components = [];
        let wires = [];
        let nextId = 1;
        let dpr = window.devicePixelRatio || 1;

        // Interaction state
        let isDraggingCanvas = false;
        let isDraggingComponent = null;
        let isDraggingPin = null;
        let dragStart = { x: 0, y: 0 };
        let mousePos = { x: 0, y: 0 };
        let popupVisible = false;
        let popupSelectedIndex = 0;
        let popupSourcePin = null;
        let hoveredPin = null;
        let selectedPin = null;
        let selectedWire = null;

        // Constants
        const GRID_SIZE = 30;
        const PIN_RADIUS = 6;
        const COMPONENT_WIDTH = 80;
        const COMPONENT_HEIGHT = 50;

        // Helper function for rounded rectangles
        if (!ctx.roundRect) {
            ctx.roundRect = function(x, y, width, height, radius) {
                if (typeof radius === 'number') {
                    radius = {tl: radius, tr: radius, br: radius, bl: radius};
                }
                this.beginPath();
                this.moveTo(x + radius.tl, y);
                this.lineTo(x + width - radius.tr, y);
                this.quadraticCurveTo(x + width, y, x + width, y + radius.tr);
                this.lineTo(x + width, y + height - radius.br);
                this.quadraticCurveTo(x + width, y + height, x + width - radius.br, y + height);
                this.lineTo(x + radius.bl, y + height);
                this.quadraticCurveTo(x, y + height, x, y + height - radius.bl);
                this.lineTo(x, y + radius.tl);
                this.quadraticCurveTo(x, y, x + radius.tl, y);
                this.closePath();
            };
        }

        // Component class
        class Component {
            constructor(type, x, y) {
                this.id = nextId++;
                this.type = type;
                this.x = x;
                this.y = y;
                this.width = COMPONENT_WIDTH;
                this.height = COMPONENT_HEIGHT;
                
                if (type === 'input') {
                    this.state = false;
                    this.outputs = [{ x: this.width, y: this.height / 2, connections: [] }];
                    this.inputs = [];
                } else if (type === 'output') {
                    this.inputs = [{ x: 0, y: this.height / 2, connections: [] }];
                    this.outputs = [];
                    this.state = false;
                } else if (type === 'gate') {
                    this.state = false;
                    this.inputs = [
                        { x: 0, y: this.height * 0.3, connections: [] },
                        { x: 0, y: this.height * 0.7, connections: [] }
                    ];
                    this.outputs = [{ x: this.width, y: this.height / 2, connections: [] }];
                }
            }

            draw() {
                ctx.save();
                
                if (this.type === 'input') {
                    // iOS-style toggle (square knob)
                    const toggleWidth = 60;
                    const toggleHeight = 32;
                    const toggleX = this.x + (this.width - toggleWidth) / 2;
                    const toggleY = this.y + (this.height - toggleHeight) / 2;
                    
                    ctx.fillStyle = this.state ? '#34C759' : '#3A3A3C';
                    ctx.beginPath();
                    ctx.roundRect(toggleX, toggleY, toggleWidth, toggleHeight, 8);
                    ctx.fill();
                    
                    const knobSize = 24;
                    const knobX = this.state ? toggleX + toggleWidth - knobSize - 4 : toggleX + 4;
                    const knobY = toggleY + 4;
                    
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.roundRect(knobX, knobY, knobSize, knobSize, 6);
                    ctx.fill();
                    
                } else if (this.type === 'output') {
                    // Hexagon LED indicator
                    const centerX = this.x + this.width / 2;
                    const centerY = this.y + this.height / 2;
                    const size = 18;
                    
                    ctx.fillStyle = this.state ? '#34C759' : '#2C2C2E';
                    ctx.strokeStyle = this.state ? '#34C759' : '#48484A';
                    ctx.lineWidth = 3;
                    
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = (Math.PI / 3) * i;
                        const x = centerX + size * Math.cos(angle);
                        const y = centerY + size * Math.sin(angle);
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    
                    // Inner glow when active
                    if (this.state) {
                        ctx.fillStyle = 'rgba(52, 199, 89, 0.4)';
                        ctx.beginPath();
                        for (let i = 0; i < 6; i++) {
                            const angle = (Math.PI / 3) * i;
                            const x = centerX + (size - 4) * Math.cos(angle);
                            const y = centerY + (size - 4) * Math.sin(angle);
                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                        ctx.closePath();
                        ctx.fill();
                    }
                    
                } else if (this.type === 'gate') {
                    // Rounded rectangle chip style
                    const chipWidth = 65;
                    const chipHeight = 40;
                    const chipX = this.x + (this.width - chipWidth) / 2;
                    const chipY = this.y + (this.height - chipHeight) / 2;
                    
                    // Main chip body
                    ctx.fillStyle = this.state ? '#5856D6' : '#2C2C2E';
                    ctx.strokeStyle = this.state ? '#7D7AFF' : '#48484A';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.roundRect(chipX, chipY, chipWidth, chipHeight, 6);
                    ctx.fill();
                    ctx.stroke();
                    
                    // AND gate symbol
                    ctx.fillStyle = this.state ? 'white' : '#8E8E93';
                    ctx.font = 'bold 14px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('AND', this.x + this.width / 2, this.y + this.height / 2);
                }
                
                // Draw pins
                this.inputs.forEach(pin => {
                    const px = this.x + pin.x;
                    const py = this.y + pin.y;
                    
                    // Check if this pin is being hovered
                    const isHovered = hoveredPin && hoveredPin.pin === pin && hoveredPin.component === this;
                    
                    // Check if this pin is selected
                    const isSelected = selectedPin && selectedPin.pin === pin && selectedPin.component === this;
                    
                    // Hover effect when dragging wire over
                    if (isHovered) {
                        const gradient = ctx.createRadialGradient(px, py, PIN_RADIUS, px, py, PIN_RADIUS * 4);
                        gradient.addColorStop(0, 'rgba(0, 122, 255, 0.4)');
                        gradient.addColorStop(1, 'rgba(0, 122, 255, 0)');
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(px, py, PIN_RADIUS * 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    
                    // Selection effect
                    if (isSelected) {
                        ctx.strokeStyle = '#FFD60A';
                        ctx.lineWidth = 3;
                        ctx.shadowColor = '#FFD60A';
                        ctx.shadowBlur = 15;
                        ctx.beginPath();
                        ctx.arc(px, py, PIN_RADIUS * 2.5, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.shadowBlur = 0;
                    }
                    
                    ctx.fillStyle = '#007AFF';
                    ctx.beginPath();
                    ctx.arc(px, py, PIN_RADIUS, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Inner highlight
                    if (isSelected) {
                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(px, py, PIN_RADIUS * 0.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
                
                this.outputs.forEach(pin => {
                    const px = this.x + pin.x;
                    const py = this.y + pin.y;
                    
                    // Check if this pin is selected
                    const isSelected = selectedPin && selectedPin.pin === pin && selectedPin.component === this;
                    
                    // Hover effect
                    const isHovered = hoveredPin && hoveredPin.pin === pin && hoveredPin.component === this;
                    if (isHovered) {
                        const gradient = ctx.createRadialGradient(px, py, PIN_RADIUS, px, py, PIN_RADIUS * 4);
                        gradient.addColorStop(0, 'rgba(255, 149, 0, 0.4)');
                        gradient.addColorStop(1, 'rgba(255, 149, 0, 0)');
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(px, py, PIN_RADIUS * 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    
                    // Selection effect
                    if (isSelected) {
                        ctx.strokeStyle = '#FFD60A';
                        ctx.lineWidth = 3;
                        ctx.shadowColor = '#FFD60A';
                        ctx.shadowBlur = 15;
                        ctx.beginPath();
                        ctx.arc(px, py, PIN_RADIUS * 2.5, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.shadowBlur = 0;
                    }
                    
                    ctx.fillStyle = '#FF9500';
                    ctx.beginPath();
                    ctx.arc(px, py, PIN_RADIUS, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Inner highlight
                    if (isSelected) {
                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(px, py, PIN_RADIUS * 0.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
                
                ctx.restore();
            }

            containsPoint(x, y) {
                return x >= this.x && x <= this.x + this.width &&
                       y >= this.y && y <= this.y + this.height;
            }

            getPinAt(x, y) {
                for (let pin of this.inputs) {
                    const px = this.x + pin.x;
                    const py = this.y + pin.y;
                    if (Math.hypot(x - px, y - py) < PIN_RADIUS * 2) {
                        return { pin, type: 'input', component: this };
                    }
                }
                for (let pin of this.outputs) {
                    const px = this.x + pin.x;
                    const py = this.y + pin.y;
                    if (Math.hypot(x - px, y - py) < PIN_RADIUS * 2) {
                        return { pin, type: 'output', component: this };
                    }
                }
                return null;
            }

            // Get the signal value for a specific input pin by checking connected wires
            getInputSignal(inputPin) {
                // Find all wires that connect to this input pin
                const connectedWires = wires.filter(wire => 
                    wire.to.component === this && wire.to.pin === inputPin
                );
                
                // Return true if any connected wire carries a true signal
                return connectedWires.some(wire => wire.from.component.state);
            }

            updateState() {
                if (this.type === 'output') {
                    // Output state is determined by its input pin's signal
                    if (this.inputs.length > 0) {
                        this.state = this.getInputSignal(this.inputs[0]);
                    }
                } else if (this.type === 'gate') {
                    // AND gate: both inputs must be true
                    const input1 = this.inputs.length > 0 ? this.getInputSignal(this.inputs[0]) : false;
                    const input2 = this.inputs.length > 1 ? this.getInputSignal(this.inputs[1]) : false;
                    this.state = input1 && input2;
                }
                // Input type state is manually toggled, not updated here
            }
        }

        // Initialize canvas with proper DPR handling
        function resizeCanvas() {
            dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
            draw();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Screen to world coordinates
        function screenToWorld(screenX, screenY) {
            return {
                x: (screenX - camera.x) / camera.zoom,
                y: (screenY - camera.y) / camera.zoom
            };
        }

        // World to screen coordinates
        function worldToScreen(worldX, worldY) {
            return {
                x: worldX * camera.zoom + camera.x,
                y: worldY * camera.zoom + camera.y
            };
        }

        // Draw grid
        function drawGrid() {
            const canvasWidth = canvas.width / dpr;
            const canvasHeight = canvas.height / dpr;
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;

            const startX = Math.floor(-camera.x / camera.zoom / GRID_SIZE) * GRID_SIZE;
            const startY = Math.floor(-camera.y / camera.zoom / GRID_SIZE) * GRID_SIZE;
            const endX = startX + canvasWidth / camera.zoom + GRID_SIZE;
            const endY = startY + canvasHeight / camera.zoom + GRID_SIZE;

            for (let x = startX; x < endX; x += GRID_SIZE) {
                const screenX = x * camera.zoom + camera.x;
                ctx.beginPath();
                ctx.moveTo(screenX, 0);
                ctx.lineTo(screenX, canvasHeight);
                ctx.stroke();
            }

            for (let y = startY; y < endY; y += GRID_SIZE) {
                const screenY = y * camera.zoom + camera.y;
                ctx.beginPath();
                ctx.moveTo(0, screenY);
                ctx.lineTo(canvasWidth, screenY);
                ctx.stroke();
            }
        }

        // Helper function to check if a point is near a wire
        function isPointNearWire(worldX, worldY, wire) {
            const fromX = wire.from.component.x + wire.from.pin.x;
            const fromY = wire.from.component.y + wire.from.pin.y;
            const toX = wire.to.component.x + wire.to.pin.x;
            const toY = wire.to.component.y + wire.to.pin.y;
            
            // Check multiple points along the bezier curve
            const threshold = 10 / camera.zoom;
            for (let t = 0; t <= 1; t += 0.05) {
                // Cubic bezier curve with control points
                const cx1 = fromX + (toX - fromX) * 0.5;
                const cy1 = fromY;
                const cx2 = fromX + (toX - fromX) * 0.5;
                const cy2 = toY;
                
                const x = Math.pow(1-t, 3) * fromX + 3 * Math.pow(1-t, 2) * t * cx1 + 3 * (1-t) * Math.pow(t, 2) * cx2 + Math.pow(t, 3) * toX;
                const y = Math.pow(1-t, 3) * fromY + 3 * Math.pow(1-t, 2) * t * cy1 + 3 * (1-t) * Math.pow(t, 2) * cy2 + Math.pow(t, 3) * toY;
                
                if (Math.hypot(worldX - x, worldY - y) < threshold) {
                    return true;
                }
            }
            return false;
        }

        // Draw wires
        function drawWires() {
            wires.forEach((wire, index) => {
                const fromPos = worldToScreen(wire.from.component.x + wire.from.pin.x, 
                                             wire.from.component.y + wire.from.pin.y);
                const toPos = worldToScreen(wire.to.component.x + wire.to.pin.x,
                                           wire.to.component.y + wire.to.pin.y);
                
                const isWireSelected = selectedWire === wire;
                const isWireActive = wire.from.component.state;
                
                // Glow effect for selected wire
                if (isWireSelected) {
                    ctx.strokeStyle = '#34C759';
                    ctx.lineWidth = 7;
                    ctx.shadowColor = '#34C759';
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.moveTo(fromPos.x, fromPos.y);
                    
                    const cx1 = fromPos.x + (toPos.x - fromPos.x) * 0.5;
                    const cy1 = fromPos.y;
                    const cx2 = fromPos.x + (toPos.x - fromPos.x) * 0.5;
                    const cy2 = toPos.y;
                    
                    ctx.bezierCurveTo(cx1, cy1, cx2, cy2, toPos.x, toPos.y);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
                
                // Main wire
                ctx.strokeStyle = isWireSelected ? '#34C759' : (isWireActive ? '#34C759' : '#666');
                ctx.lineWidth = isWireSelected ? 3 : 3;
                ctx.beginPath();
                ctx.moveTo(fromPos.x, fromPos.y);
                
                const cx1 = fromPos.x + (toPos.x - fromPos.x) * 0.5;
                const cy1 = fromPos.y;
                const cx2 = fromPos.x + (toPos.x - fromPos.x) * 0.5;
                const cy2 = toPos.y;
                
                ctx.bezierCurveTo(cx1, cy1, cx2, cy2, toPos.x, toPos.y);
                ctx.stroke();
                
                // Inner highlight for selected wire
                if (isWireSelected) {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(fromPos.x, fromPos.y);
                    ctx.bezierCurveTo(cx1, cy1, cx2, cy2, toPos.x, toPos.y);
                    ctx.stroke();
                }
            });

            // Draw temporary wire while dragging
            if (isDraggingPin) {
                const fromPos = worldToScreen(
                    isDraggingPin.component.x + isDraggingPin.pin.x,
                    isDraggingPin.component.y + isDraggingPin.pin.y
                );
                
                ctx.strokeStyle = '#007AFF';
                ctx.lineWidth = 3;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(fromPos.x, fromPos.y);
                
                const cx1 = fromPos.x + (mousePos.x - fromPos.x) * 0.5;
                const cy1 = fromPos.y;
                const cx2 = fromPos.x + (mousePos.x - fromPos.x) * 0.5;
                const cy2 = mousePos.y;
                
                ctx.bezierCurveTo(cx1, cy1, cx2, cy2, mousePos.x, mousePos.y);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        // Remove wires connected to a pin
        function removeWiresForPin(pinInfo) {
            // Remove all wires connected to this pin
            wires = wires.filter(wire => {
                return !(wire.from.component === pinInfo.component && wire.from.pin === pinInfo.pin) &&
                       !(wire.to.component === pinInfo.component && wire.to.pin === pinInfo.pin);
            });
            
            // Clear connections array for the pin
            pinInfo.pin.connections = [];
        }

        // Main draw function
        function draw() {
            const canvasWidth = canvas.width / dpr;
            const canvasHeight = canvas.height / dpr;
            
            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
            
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            
            drawGrid();
            
            ctx.save();
            ctx.translate(camera.x, camera.y);
            ctx.scale(camera.zoom, camera.zoom);
            
            components.forEach(comp => comp.draw());
            
            ctx.restore();
            
            drawWires();
            
            ctx.restore();
        }

        // Create component
        function createComponent(type, worldX, worldY) {
            const comp = new Component(type, worldX, worldY);
            components.push(comp);
            return comp;
        }

        // Update logic - propagate states through the circuit
        function updateLogic() {
            // Update in order: inputs first (their state is manual), then gates, then outputs
            // We need to update gates and outputs based on current wire states
            
            // Update all gates
            components.filter(c => c.type === 'gate').forEach(comp => comp.updateState());
            
            // Update all outputs
            components.filter(c => c.type === 'output').forEach(comp => comp.updateState());
            
            draw();
        }

        // Keyboard event for deletion
        document.addEventListener('keydown', (e) => {
            // Handle delete/backspace for selected elements
            if ((e.key === 'Delete' || e.key === 'Backspace') && (selectedPin || selectedWire)) {
                e.preventDefault();
                
                if (selectedPin) {
                    removeWiresForPin(selectedPin);
                    selectedPin = null;
                    updateLogic();
                    draw();
                } else if (selectedWire) {
                    // Remove the selected wire
                    wires = wires.filter(wire => wire !== selectedWire);
                    selectedWire = null;
                    updateLogic();
                    draw();
                }
                return;
            }

            // Handle popup navigation
            if (popupVisible) {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    popupSelectedIndex = (popupSelectedIndex + 1) % 3;
                    updatePopupSelection();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    popupSelectedIndex = (popupSelectedIndex - 1 + 3) % 3;
                    updatePopupSelection();
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    selectPopupItem();
                } else if (e.key === 'Escape') {
                    popup.classList.remove('show');
                    popupVisible = false;
                }
                return;
            }

            // Handle component shortcuts
            const rect = canvas.getBoundingClientRect();
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const world = screenToWorld(centerX, centerY);

            if (e.key === '1') {
                createComponent('input', world.x, world.y);
                draw();
            } else if (e.key === '2') {
                createComponent('output', world.x, world.y);
                draw();
            } else if (e.key === '3') {
                createComponent('gate', world.x, world.y);
                draw();
            } else if (e.key === 'Escape') {
                // Deselect on escape
                selectedPin = null;
                selectedWire = null;
                draw();
            }
        });

        // Mouse events
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const screenX = e.clientX - rect.left;
            const screenY = e.clientY - rect.top;
            const world = screenToWorld(screenX, screenY);
            
            mousePos = { x: screenX, y: screenY };

            // Check for pin click (left side - input pins)
            for (let comp of [...components].reverse()) {
                const pinInfo = comp.getPinAt(world.x, world.y);
                if (pinInfo && pinInfo.type === 'output') {
                    // Start dragging from output pin
                    isDraggingPin = pinInfo;
                    // Clear selection when starting to drag
                    selectedPin = null;
                    selectedWire = null;
                    return;
                }
                if (pinInfo && pinInfo.type === 'input') {
                    // Select input pin (don't start drag)
                    selectedPin = pinInfo;
                    selectedWire = null;
                    isDraggingPin = null;
                    draw();
                    return;
                }
            }

            // Check for wire click
            for (let wire of wires) {
                if (isPointNearWire(world.x, world.y, wire)) {
                    selectedWire = wire;
                    selectedPin = null;
                    isDraggingPin = null;
                    draw();
                    return;
                }
            }

            // Check for component click
            for (let comp of [...components].reverse()) {
                if (comp.containsPoint(world.x, world.y)) {
                    if (comp.type === 'input') {
                        // Toggle input state on click
                        comp.state = !comp.state;
                        updateLogic();
                    } else if (comp.type === 'gate') {
                        // Gate is not interactive by click (only via inputs)
                        // But we can still drag it
                    }
                    isDraggingComponent = comp;
                    dragStart = { x: world.x - comp.x, y: world.y - comp.y };
                    // Clear selections when dragging component
                    selectedPin = null;
                    selectedWire = null;
                    return;
                }
            }

            // Start canvas drag
            isDraggingCanvas = true;
            dragStart = { x: e.clientX - camera.x, y: e.clientY - camera.y };
            canvas.classList.add('grabbing');
            
            // Clear selections when clicking on empty canvas
            selectedPin = null;
            selectedWire = null;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const screenX = e.clientX - rect.left;
            const screenY = e.clientY - rect.top;
            const world = screenToWorld(screenX, screenY);
            
            mousePos = { x: screenX, y: screenY };

            // Check for hover over pins (when dragging a wire or just hovering)
            hoveredPin = null;
            for (let comp of components) {
                const pinInfo = comp.getPinAt(world.x, world.y);
                if (pinInfo) {
                    // Only show hover effect on input pins when dragging from output
                    // Or on any pin when not dragging
                    if (isDraggingPin) {
                        // When dragging from output, only highlight input pins of other components
                        if (pinInfo.type === 'input' && pinInfo.component !== isDraggingPin.component) {
                            hoveredPin = pinInfo;
                        }
                    } else {
                        hoveredPin = pinInfo;
                    }
                    break;
                }
            }

            if (isDraggingCanvas) {
                camera.x = e.clientX - dragStart.x;
                camera.y = e.clientY - dragStart.y;
                draw();
            } else if (isDraggingComponent) {
                isDraggingComponent.x = world.x - dragStart.x;
                isDraggingComponent.y = world.y - dragStart.y;
                draw();
            } else if (isDraggingPin) {
                draw();
            } else if (hoveredPin) {
                draw();
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            const rect = canvas.getBoundingClientRect();
            const screenX = e.clientX - rect.left;
            const screenY = e.clientY - rect.top;
            const world = screenToWorld(screenX, screenY);

            if (isDraggingPin) {
                // Check if released on another pin
                let targetPin = null;
                for (let comp of components) {
                    const pinInfo = comp.getPinAt(world.x, world.y);
                    if (pinInfo && pinInfo.type === 'input' && pinInfo.component !== isDraggingPin.component) {
                        targetPin = pinInfo;
                        break;
                    }
                }

                if (targetPin) {
                    // Create wire
                    wires.push({
                        from: isDraggingPin,
                        to: targetPin
                    });
                    targetPin.pin.connections.push(isDraggingPin.component);
                    updateLogic();
                } else {
                    // Show popup
                    popup.style.left = screenX + 'px';
                    popup.style.top = screenY + 'px';
                    popup.classList.add('show');
                    popupVisible = true;
                    popupSelectedIndex = 0;
                    popupSourcePin = isDraggingPin;
                    updatePopupSelection();
                }
                isDraggingPin = null;
                hoveredPin = null;
            }

            isDraggingCanvas = false;
            isDraggingComponent = null;
            canvas.classList.remove('grabbing');
            draw();
        });

        // Wheel event for zoom
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            const worldBefore = screenToWorld(mouseX, mouseY);
            
            const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
            camera.zoom *= zoomFactor;
            camera.zoom = Math.max(0.1, Math.min(5, camera.zoom));
            
            const worldAfter = screenToWorld(mouseX, mouseY);
            
            camera.x += (worldAfter.x - worldBefore.x) * camera.zoom;
            camera.y += (worldAfter.y - worldBefore.y) * camera.zoom;
            
            zoomIndicator.textContent = Math.round(camera.zoom * 100) + '%';
            draw();
        }, { passive: false });

        // Popup selection
        function updatePopupSelection() {
            const items = popup.querySelectorAll('.popup-item');
            items.forEach((item, i) => {
                item.classList.toggle('selected', i === popupSelectedIndex);
            });
        }

        function selectPopupItem() {
            const items = popup.querySelectorAll('.popup-item');
            const selectedType = items[popupSelectedIndex].dataset.type;
            
            const rect = popup.getBoundingClientRect();
            const world = screenToWorld(rect.left, rect.top);
            
            const newComp = createComponent(selectedType, world.x, world.y);
            
            // Auto-connect: connect from source output pin to new component's input
            if (popupSourcePin && newComp.inputs.length > 0) {
                // Find first available input pin
                const targetPin = newComp.inputs[0];
                wires.push({
                    from: popupSourcePin,
                    to: { pin: targetPin, type: 'input', component: newComp }
                });
                targetPin.connections.push(popupSourcePin.component);
                updateLogic();
            }
            
            popup.classList.remove('show');
            popupVisible = false;
            popupSourcePin = null;
            draw();
        }

        // Nav bar clicks
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                const type = btn.dataset.type;
                const rect = canvas.getBoundingClientRect();
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const world = screenToWorld(centerX, centerY);
                createComponent(type, world.x, world.y);
                draw();
            });
        });

        // Popup item clicks
        document.querySelectorAll('.popup-item').forEach((item, index) => {
            item.addEventListener('mouseenter', () => {
                popupSelectedIndex = index;
                updatePopupSelection();
            });
            item.addEventListener('click', selectPopupItem);
        });

        // Close popup on outside click
        document.addEventListener('click', (e) => {
            if (popupVisible && !popup.contains(e.target) && !e.target.closest('.nav-bar')) {
                popup.classList.remove('show');
                popupVisible = false;
            }
        });
    </script>
</body>
</html>
