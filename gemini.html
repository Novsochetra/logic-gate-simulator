<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Logic Gate Simulator · Infinite Canvas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      background: #1a1a1a;
      width: 100vw;
      height: 100vh;
    }
    #canvas {
      display: block;
      cursor: grab;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #canvas.grabbing {
      cursor: grabbing;
    }
    .nav-bar {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 30, 30, 0.85);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 10px 24px;
      display: flex;
      gap: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
      z-index: 1200;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .nav-item {
      background: rgba(255, 255, 255, 0.08);
      border: none;
      padding: 12px 24px;
      border-radius: 18px;
      color: #f0f0f0;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      letter-spacing: 0.3px;
    }
    .nav-item:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateY(-2px);
      color: white;
    }
    .nav-item:active {
      transform: translateY(1px);
    }
    .shortcut {
      position: absolute;
      top: -10px;
      right: -10px;
      background: #007AFF;
      color: white;
      width: 22px;
      height: 22px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    }
    .component-popup {
      position: fixed;
      background: rgba(25, 25, 25, 0.98);
      backdrop-filter: blur(20px);
      border-radius: 18px;
      padding: 6px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
      z-index: 2500;
      display: none;
      border: 1px solid rgba(255,255,255,0.2);
      min-width: 180px;
    }
    .component-popup.show {
      display: block;
    }
    .popup-item {
      padding: 12px 18px;
      color: #ccc;
      cursor: pointer;
      border-radius: 12px;
      transition: all 0.15s;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .popup-item:last-child { margin-bottom: 0; }
    .popup-item.selected {
      background: #007AFF;
      color: white;
    }
    .zoom-indicator {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(20, 20, 20, 0.8);
      backdrop-filter: blur(12px);
      padding: 8px 18px;
      border-radius: 40px;
      color: #ccc;
      font-size: 13px;
      font-weight: 500;
      z-index: 1100;
      border: 1px solid rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div class="nav-bar">
    <button class="nav-item" data-type="input">⚡ Input <span class="shortcut">1</span></button>
    <button class="nav-item" data-type="output">💡 Output <span class="shortcut">2</span></button>
    <button class="nav-item" data-type="gate">🔘 Gate <span class="shortcut">3</span></button>
  </div>

  <div class="component-popup" id="componentPopup">
    <div class="popup-item" data-type="input" data-index="0">⚡ Input Component</div>
    <div class="popup-item" data-type="output" data-index="1">💡 Output Component</div>
    <div class="popup-item" data-type="gate" data-index="2">🟣 AND Logic Gate</div>
  </div>

  <div class="zoom-indicator" id="zoomIndicator">100%</div>

  <script>
    (function() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const popup = document.getElementById('componentPopup');
      const zoomIndicator = document.getElementById('zoomIndicator');

      let camera = { x: 0, y: 0, zoom: 1 };
      let components = [];
      let wires = [];
      let nextId = 1;
      let dpr = window.devicePixelRatio || 1;

      let isDraggingCanvas = false;
      let isDraggingComponent = null;
      let isDraggingPin = null;
      let dragStart = { x: 0, y: 0 };
      let mousePos = { x: 0, y: 0 };
      let popupVisible = false;
      let popupSelectedIndex = 0;
      let popupSourcePin = null;
      let popupWorldPos = { x: 0, y: 0 };
      let hoveredPin = null;
      let selectedPin = null;
      let selectedWire = null;

      const GRID_SIZE = 40;
      const PIN_RADIUS = 7;
      const COMPONENT_WIDTH = 100;
      const COMPONENT_HEIGHT = 60;

      // Polyfill for roundRect
      if (!ctx.roundRect) {
        ctx.roundRect = function(x, y, width, height, radius) {
          if (typeof radius === 'number') radius = {tl: radius, tr: radius, br: radius, bl: radius};
          this.beginPath();
          this.moveTo(x + radius.tl, y);
          this.lineTo(x + width - radius.tr, y);
          this.quadraticCurveTo(x + width, y, x + width, y + radius.tr);
          this.lineTo(x + width, y + height - radius.br);
          this.quadraticCurveTo(x + width, y + height, x + width - radius.br, y + height);
          this.lineTo(x + radius.bl, y + height);
          this.quadraticCurveTo(x, y + height, x, y + height - radius.bl);
          this.lineTo(x, y + radius.tl);
          this.quadraticCurveTo(x, y, x + radius.tl, y);
          this.closePath();
        };
      }

      class Component {
        constructor(type, x, y) {
          this.id = nextId++;
          this.type = type;
          this.x = x;
          this.y = y;
          this.width = COMPONENT_WIDTH;
          this.height = COMPONENT_HEIGHT;
          
          if (type === 'input') {
            this.state = false;
            this.outputs = [{ x: this.width, y: this.height / 2, connections: [] }];
            this.inputs = [];
          } else if (type === 'output') {
            this.inputs = [{ x: 0, y: this.height / 2, connections: [] }];
            this.outputs = [];
            this.state = false;
          } else if (type === 'gate') {
            this.state = false;
            this.inputs = [
              { x: 0, y: this.height * 0.3, connections: [] },
              { x: 0, y: this.height * 0.7, connections: [] }
            ];
            this.outputs = [{ x: this.width, y: this.height / 2, connections: [] }];
          }
        }

        draw() {
          ctx.save();
          if (this.type === 'input') {
            // Square iOS-style toggle
            const toggleW = 70;
            const toggleH = 38;
            const tx = this.x + (this.width - toggleW) / 2;
            const ty = this.y + (this.height - toggleH) / 2;
            
            // Track
            ctx.fillStyle = this.state ? '#34C759' : '#3A3A3C';
            ctx.roundRect(tx, ty, toggleW, toggleH, 8);
            ctx.fill();
            
            // Knob (Square rounded)
            const knobS = 30;
            const kOffset = 4;
            const kx = this.state ? (tx + toggleW - knobS - kOffset) : (tx + kOffset);
            ctx.fillStyle = 'white';
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 4;
            ctx.roundRect(kx, ty + kOffset, knobS, knobS, 6);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 10px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("INPUT", this.x + this.width/2, this.y - 6);
          } else if (this.type === 'output') {
            const centerX = this.x + this.width / 2;
            const centerY = this.y + this.height / 2;
            const size = 20;
            ctx.fillStyle = this.state ? '#FFD60A' : '#2C2C2E';
            ctx.strokeStyle = this.state ? '#FFD60A' : '#48484A';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.roundRect(centerX - size/2, centerY - size/2, size, size, 6);
            ctx.fill();
            ctx.stroke();
            if (this.state) {
              ctx.shadowColor = '#FFD60A';
              ctx.shadowBlur = 15;
              ctx.stroke();
            }
          } else if (this.type === 'gate') {
            const gx = this.x + 5;
            const gy = this.y + 5;
            const gw = this.width - 10;
            const gh = this.height - 10;
            ctx.fillStyle = '#2C2C2E';
            ctx.strokeStyle = this.state ? '#5856D6' : '#48484A';
            ctx.lineWidth = 2;
            ctx.roundRect(gx, gy, gw, gh, 10);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = 'white';
            ctx.font = 'bold 14px monospace';
            ctx.textAlign = 'center';
            ctx.fillText("AND", this.x + this.width/2, this.y + this.height/2 + 5);
          }

          // Draw Pins
          [...this.inputs, ...this.outputs].forEach(pin => {
            const px = this.x + pin.x;
            const py = this.y + pin.y;
            const isHovered = hoveredPin && hoveredPin.pin === pin && hoveredPin.component === this;
            const isSelected = selectedPin && selectedPin.pin === pin && selectedPin.component === this;
            
            if (isHovered || isSelected) {
              ctx.beginPath();
              ctx.arc(px, py, PIN_RADIUS * 2.5, 0, Math.PI * 2);
              ctx.fillStyle = isSelected ? 'rgba(255, 214, 10, 0.2)' : 'rgba(255, 255, 255, 0.1)';
              ctx.fill();
            }
            
            ctx.fillStyle = this.inputs.includes(pin) ? '#007AFF' : '#FF9500';
            ctx.beginPath();
            ctx.arc(px, py, PIN_RADIUS, 0, Math.PI * 2);
            ctx.fill();
            
            if (isSelected) {
              ctx.strokeStyle = '#FFD60A';
              ctx.lineWidth = 2;
              ctx.stroke();
            }
          });
          ctx.restore();
        }

        containsPoint(x, y) {
          return x >= this.x && x <= this.x + this.width && y >= this.y && y <= this.y + this.height;
        }

        getPinAt(x, y) {
          for (let pin of this.inputs) {
            if (Math.hypot(x - (this.x+pin.x), y - (this.y+pin.y)) < PIN_RADIUS * 2.5)
              return { pin, type: 'input', component: this };
          }
          for (let pin of this.outputs) {
            if (Math.hypot(x - (this.x+pin.x), y - (this.y+pin.y)) < PIN_RADIUS * 2.5)
              return { pin, type: 'output', component: this };
          }
          return null;
        }

        updateState() {
          if (this.type === 'output') {
            const connected = wires.find(w => w.to.component === this);
            this.state = connected ? connected.from.component.state : false;
          } else if (this.type === 'gate') {
            const in1 = wires.find(w => w.to.component === this && w.to.pin === this.inputs[0]);
            const in2 = wires.find(w => w.to.component === this && w.to.pin === this.inputs[1]);
            const s1 = in1 ? in1.from.component.state : false;
            const s2 = in2 ? in2.from.component.state : false;
            this.state = s1 && s2;
          }
        }
      }

      function screenToWorld(sx, sy) {
        return { x: (sx - camera.x) / camera.zoom, y: (sy - camera.y) / camera.zoom };
      }
      function worldToScreen(wx, wy) {
        return { x: wx * camera.zoom + camera.x, y: wy * camera.zoom + camera.y };
      }

      function resizeCanvas() {
        dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
        draw();
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      function drawGrid() {
        const w = window.innerWidth, h = window.innerHeight;
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        const startX = Math.floor(-camera.x / camera.zoom / GRID_SIZE) * GRID_SIZE;
        const startY = Math.floor(-camera.y / camera.zoom / GRID_SIZE) * GRID_SIZE;
        for (let x = startX; x < startX + w / camera.zoom + GRID_SIZE; x += GRID_SIZE) {
          const sx = x * camera.zoom + camera.x;
          ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, h); ctx.stroke();
        }
        for (let y = startY; y < startY + h / camera.zoom + GRID_SIZE; y += GRID_SIZE) {
          const sy = y * camera.zoom + camera.y;
          ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(w, sy); ctx.stroke();
        }
      }

      function drawWires() {
        wires.forEach(wire => {
          const from = worldToScreen(wire.from.component.x + wire.from.pin.x, wire.from.component.y + wire.from.pin.y);
          const to = worldToScreen(wire.to.component.x + wire.to.pin.x, wire.to.component.y + wire.to.pin.y);
          const active = wire.from.component.state;
          const selected = selectedWire === wire;
          
          ctx.beginPath();
          ctx.moveTo(from.x, from.y);
          ctx.bezierCurveTo(from.x + (to.x - from.x) / 2, from.y, from.x + (to.x - from.x) / 2, to.y, to.x, to.y);
          
          if (selected) {
            ctx.strokeStyle = '#FFD60A';
            ctx.lineWidth = 5;
            ctx.stroke();
          }
          
          ctx.strokeStyle = active ? '#34C759' : '#8E8E93';
          ctx.lineWidth = 3;
          ctx.stroke();
        });

        if (isDraggingPin) {
          const from = worldToScreen(isDraggingPin.component.x + isDraggingPin.pin.x, isDraggingPin.component.y + isDraggingPin.pin.y);
          ctx.beginPath();
          ctx.moveTo(from.x, from.y);
          ctx.bezierCurveTo(from.x + (mousePos.x - from.x) / 2, from.y, from.x + (mousePos.x - from.x) / 2, mousePos.y, mousePos.x, mousePos.y);
          ctx.strokeStyle = '#007AFF';
          ctx.setLineDash([5, 5]);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGrid();
        ctx.save();
        ctx.translate(camera.x, camera.y);
        ctx.scale(camera.zoom, camera.zoom);
        components.forEach(c => c.draw());
        ctx.restore();
        drawWires();
      }

      function updateLogic() {
        // Simple iterative update for propagation
        for(let i=0; i<components.length; i++) {
          components.forEach(c => c.updateState());
        }
        draw();
      }

      function showPopup(sx, sy, sourcePin) {
        popupVisible = true;
        popupSourcePin = sourcePin;
        popupWorldPos = screenToWorld(sx, sy);
        popup.style.display = 'block';
        popup.style.left = sx + 'px';
        popup.style.top = sy + 'px';
        popupSelectedIndex = 0;
        updatePopupUI();
      }

      function hidePopup() {
        popupVisible = false;
        popup.style.display = 'none';
      }

      function updatePopupUI() {
        const items = popup.querySelectorAll('.popup-item');
        items.forEach((item, idx) => {
          item.classList.toggle('selected', idx === popupSelectedIndex);
        });
      }

      function selectPopupItem() {
        if (!popupVisible) return;
        const items = popup.querySelectorAll('.popup-item');
        const type = items[popupSelectedIndex].dataset.type;
        
        // Offset so component is centered on release point
        const newComp = new Component(type, popupWorldPos.x - COMPONENT_WIDTH/2, popupWorldPos.y - COMPONENT_HEIGHT/2);
        components.push(newComp);
        
        // Auto connect
        if (popupSourcePin && popupSourcePin.type === 'output' && newComp.inputs.length > 0) {
          wires.push({ from: popupSourcePin, to: { pin: newComp.inputs[0], component: newComp, type: 'input' }});
        } else if (popupSourcePin && popupSourcePin.type === 'input' && newComp.outputs.length > 0) {
          wires.push({ from: { pin: newComp.outputs[0], component: newComp, type: 'output' }, to: popupSourcePin });
        }
        
        hidePopup();
        updateLogic();
      }

      canvas.addEventListener('mousedown', e => {
        const sx = e.clientX, sy = e.clientY;
        const world = screenToWorld(sx, sy);
        
        // 1. Check Pins
        for (let comp of components) {
          const pinInfo = comp.getPinAt(world.x, world.y);
          if (pinInfo) {
            isDraggingPin = pinInfo;
            selectedPin = pinInfo;
            selectedWire = null;
            return;
          }
        }

        // 2. Check Wires
        selectedWire = null;
        for (let wire of wires) {
          // Simplistic distance to wire check
          const from = worldToScreen(wire.from.component.x + wire.from.pin.x, wire.from.component.y + wire.from.pin.y);
          const to = worldToScreen(wire.to.component.x + wire.to.pin.x, wire.to.component.y + wire.to.pin.y);
          const d = distToSegment({x: sx, y: sy}, from, to);
          if (d < 10) {
            selectedWire = wire;
            selectedPin = null;
            draw();
            return;
          }
        }

        // 3. Check Components
        for (let comp of components) {
          if (comp.containsPoint(world.x, world.y)) {
            if (comp.type === 'input') {
              comp.state = !comp.state;
              updateLogic();
            }
            isDraggingComponent = comp;
            dragStart = { x: world.x - comp.x, y: world.y - comp.y };
            return;
          }
        }

        // 4. Pan Canvas
        isDraggingCanvas = true;
        dragStart = { x: sx - camera.x, y: sy - camera.y };
        canvas.classList.add('grabbing');
        hidePopup();
      });

      window.addEventListener('mousemove', e => {
        mousePos = { x: e.clientX, y: e.clientY };
        const world = screenToWorld(mousePos.x, mousePos.y);

        if (isDraggingCanvas) {
          camera.x = mousePos.x - dragStart.x;
          camera.y = mousePos.y - dragStart.y;
        } else if (isDraggingComponent) {
          isDraggingComponent.x = world.x - dragStart.x;
          isDraggingComponent.y = world.y - dragStart.y;
        }

        // Hover Effect
        hoveredPin = null;
        for (let comp of components) {
          const p = comp.getPinAt(world.x, world.y);
          if (p) hoveredPin = p;
        }

        draw();
      });

      window.addEventListener('mouseup', e => {
        if (isDraggingPin) {
          const world = screenToWorld(e.clientX, e.clientY);
          let targetPin = null;
          for (let comp of components) {
            const p = comp.getPinAt(world.x, world.y);
            if (p && p.component !== isDraggingPin.component && p.type !== isDraggingPin.type) {
              targetPin = p;
              break;
            }
          }

          if (targetPin) {
            const from = isDraggingPin.type === 'output' ? isDraggingPin : targetPin;
            const to = isDraggingPin.type === 'input' ? isDraggingPin : targetPin;
            // Prevent multiple wires to same input
            wires = wires.filter(w => w.to.pin !== to.pin || w.to.component !== to.component);
            wires.push({ from, to });
            updateLogic();
          } else {
            showPopup(e.clientX, e.clientY, isDraggingPin);
          }
        }

        isDraggingCanvas = false;
        isDraggingComponent = null;
        isDraggingPin = null;
        canvas.classList.remove('grabbing');
        draw();
      });

      window.addEventListener('wheel', e => {
        e.preventDefault();
        const before = screenToWorld(e.clientX, e.clientY);
        const zoomSpeed = 0.0015;
        camera.zoom *= (1 - e.deltaY * zoomSpeed);
        camera.zoom = Math.max(0.2, Math.min(3, camera.zoom));
        const after = screenToWorld(e.clientX, e.clientY);
        camera.x += (after.x - before.x) * camera.zoom;
        camera.y += (after.y - before.y) * camera.zoom;
        zoomIndicator.textContent = Math.round(camera.zoom * 100) + '%';
        draw();
      }, { passive: false });

      window.addEventListener('keydown', e => {
        if (popupVisible) {
          if (e.key === 'ArrowDown') {
            popupSelectedIndex = (popupSelectedIndex + 1) % 3;
            updatePopupUI();
          } else if (e.key === 'ArrowUp') {
            popupSelectedIndex = (popupSelectedIndex + 2) % 3;
            updatePopupUI();
          } else if (e.key === 'Enter') {
            selectPopupItem();
          } else if (e.key === 'Escape') {
            hidePopup();
          }
          return;
        }

        if (e.key === 'Delete' || e.key === 'Backspace') {
          if (selectedWire) {
            wires = wires.filter(w => w !== selectedWire);
            selectedWire = null;
            updateLogic();
          } else if (selectedPin) {
            wires = wires.filter(w => w.from.pin !== selectedPin.pin && w.to.pin !== selectedPin.pin);
            selectedPin = null;
            updateLogic();
          }
        }

        const center = screenToWorld(window.innerWidth/2, window.innerHeight/2);
        if (e.key === '1') components.push(new Component('input', center.x, center.y));
        if (e.key === '2') components.push(new Component('output', center.x, center.y));
        if (e.key === '3') components.push(new Component('gate', center.x, center.y));
        draw();
      });

      // Utility
      function distToSegment(p, v, w) {
        const l2 = Math.hypot(v.x - w.x, v.y - w.y) ** 2;
        if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
        let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
        t = Math.max(0, Math.min(1, t));
        return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
      }

      // Nav bar
      document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
          const center = screenToWorld(window.innerWidth/2, window.innerHeight/2);
          components.push(new Component(btn.dataset.type, center.x, center.y));
          draw();
        });
      });

      canvas.addEventListener('contextmenu', e => e.preventDefault());

    })();
  </script>
</body>
</html>
